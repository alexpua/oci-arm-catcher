name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck oci-arm-catcher.sh scripts/get-config.sh

  bats:
    name: bats tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: |
          sudo apt-get update && sudo apt-get install -y bats
      - name: Run bats
        run: bats tests/

  pester:
    name: Pester tests (PowerShell)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.0 -Force -SkipPublisherCheck -Scope CurrentUser
          Import-Module Pester -MinimumVersion 5.0 -Force
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = 'tests/oci-arm-catcher.Tests.ps1'
          $cfg.Run.Exit = $true
          Invoke-Pester -Configuration $cfg
